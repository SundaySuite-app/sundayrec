name: CI

on:
  # The repo is public, so Actions minutes are free — run the full gate on
  # every push to main and every PR (it used to be tag-only to save minutes
  # while the account's billing was blocked), plus on v* tags alongside
  # release.yml and via manual dispatch.
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri needs the system webview + GTK libs to compile on Linux; cpal
      # needs ALSA dev headers (libasound2-dev) for the VU metering engine.
      # ffmpeg itself ships as a sidecar binary (fetched below), not a system
      # dependency.
      - name: Install Tauri + audio system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libasound2-dev

      - run: npm ci

      # Populate src-tauri/binaries/ffmpeg-<triple> + ffprobe so the media
      # health-check + recorder integration tests resolve a real binary instead
      # of taking their tolerant skip path.
      - name: Fetch ffmpeg/ffprobe sidecars
        run: npm run ffmpeg

      - name: Frontend lint / format / types
        run: |
          npm run lint
          npm run format:check
          npm run typecheck

      # Vitest: pure renderer logic (editor cut-plan/geometry, locale parity).
      - name: Frontend unit tests
        run: npm run test

      # package.json / Cargo.toml / tauri.conf.json must agree on the version.
      - name: App version in sync
        run: npm run version-sync

      # The Rust suite is deliberately device-INDEPENDENT (device enumeration
      # tolerates zero devices; the cpal/ffmpeg streams are not opened in tests;
      # the keychain test skips when no keychain is reachable) so it passes on a
      # headless runner. Hardware capture/preview is validated manually — see
      # docs/MIGRATION-TAURI2.md, Phase 0/3 hardware matrix.
      - name: Rust fmt / clippy / tests
        working-directory: src-tauri
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      # The ts-rs bindings are generated from the Rust types into the transient
      # src/lib/bindings/ and synced to the COMMITTED legacy/bindings/ (which
      # the renderer's legacy/types re-export). Regenerate and fail if the
      # committed copy drifted, so the frontend contract can never silently
      # diverge from the backend.
      - name: ts-rs bindings are up to date
        run: |
          npm run bindings
          # status --porcelain (not diff): also catches brand-new binding files,
          # which are untracked and invisible to `git diff`.
          if [ -n "$(git status --porcelain -- legacy/bindings)" ]; then
            echo "::error::ts-rs bindings are stale — run 'npm run bindings' and commit the result."
            git status --porcelain -- legacy/bindings
            git --no-pager diff -- legacy/bindings
            exit 1
          fi

      # Compile the frontend + the Rust app on Linux (fast smoke; the real
      # macOS/Windows bundles are built in release.yml). --no-bundle skips
      # installer packaging.
      - name: Build Tauri app (no bundle)
        run: npm run tauri build -- --no-bundle

  # Dependency vulnerability scan — advisory DBs for both ecosystems. Runs as
  # its own job so a slow cargo-audit install doesn't hold up the main gate.
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
